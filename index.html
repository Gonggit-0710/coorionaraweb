<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COORIONARA — Korean Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #F6F1EB;
      --bg-soft:  #EEE8DE;
      --beige:    #E0D4C0;
      --pink:     #D9B8B5;
      --pink-lt:  #EDD9D6;
      --brown:    #8C6A55;
      --brown-dk: #5A3E30;
      --gold:     #C4A07A;
      --dark:     #2A2018;
      --mid:      #7A6858;
      --white:    #FDFAF6;
      --sans: 'DM Sans', system-ui, sans-serif;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --max: 1320px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--dark); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: var(--max); margin: 0 auto; padding: 0 clamp(1.5rem, 4vw, 4rem); }
    .divider { width: 40px; height: 1px; background: var(--beige); margin: 1.5rem 0; }
    .ph { background: var(--bg-soft); position: relative; overflow: hidden; }
    .ph::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--beige) 0%, var(--pink-lt) 100%); opacity: 0.5; }
    .ph-label { position: absolute; bottom: 1.2rem; left: 1.2rem; z-index: 2; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); background: rgba(246,241,235,0.85); padding: 0.25rem 0.6rem; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(246,241,235,0.93); backdrop-filter: blur(12px); border-bottom: 1px solid var(--beige); }
    .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 clamp(1.5rem, 4vw, 4rem); height: 68px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-size: 15px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dark); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); transition: color 0.2s; }
    .nav-links a:hover { color: var(--dark); }

    /* Language switcher */
    .lang-switcher { display: flex; align-items: center; gap: 0; border: 1px solid var(--beige); border-radius: 999px; overflow: hidden; }
    .lang-btn { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); background: transparent; border: none; cursor: pointer; padding: 0.4rem 0.9rem; transition: background 0.18s, color 0.18s; font-family: var(--sans); }
    .lang-btn.active { background: var(--dark); color: var(--white); }
    .lang-btn:not(.active):hover { background: var(--bg-soft); color: var(--dark); }

    /* HERO */
    .hero { padding-top: 68px; min-height: 100svh; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; position: relative; }
    .hero-text { display: flex; flex-direction: column; justify-content: center; padding: clamp(4rem,8vw,8rem) clamp(1.5rem,4vw,4rem) clamp(4rem,8vw,8rem) clamp(2rem,6vw,6rem); }
    .hero-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brown); margin-bottom: 2rem; }
    .hero-h1 { font-size: clamp(3.5rem,6vw,7rem); font-weight: 900; line-height: 0.95; letter-spacing: -0.03em; color: var(--dark); margin-bottom: 1rem; }
    .hero-h1 em { font-family: var(--serif); font-style: italic; font-weight: 300; color: var(--brown); letter-spacing: 0; }
    .hero-sub { font-size: clamp(0.9rem,1.2vw,1.05rem); color: var(--mid); max-width: 380px; line-height: 1.8; margin-top: 2rem; margin-bottom: 3rem; }
    .hero-cta-row { display: flex; align-items: center; gap: 2rem; }
    .btn-primary { display: inline-flex; align-items: center; gap: 0.6rem; background: var(--dark); color: var(--white); font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 1rem 2.2rem; border-radius: 999px; transition: background 0.2s; font-family: var(--sans); }
    .btn-primary:hover { background: var(--brown-dk); }
    .btn-ghost { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); border-bottom: 1px solid var(--beige); padding-bottom: 2px; }
    .hero-image { position: relative; height: 100%; }
    .hero-image .ph { height: 100%; min-height: 640px; }
    .hero-image .ph::before { content: 'Product Photography'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brown); opacity: 0.6; }
    .hero-badge { position: absolute; bottom: 3rem; left: -3rem; z-index: 10; background: var(--white); border: 1px solid var(--beige); padding: 1.2rem 1.6rem; border-radius: 1rem; min-width: 160px; box-shadow: 0 8px 32px rgba(42,32,24,0.08); }
    .hero-badge-num { font-size: 2.2rem; font-weight: 900; color: var(--dark); line-height: 1; }
    .hero-badge-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brown); margin-top: 0.4rem; }
    .hero-scroll { position: absolute; bottom: 2.5rem; left: clamp(2rem,6vw,6rem); display: flex; align-items: center; gap: 0.8rem; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); }
    .hero-scroll::before { content: ''; display: block; width: 32px; height: 1px; background: var(--beige); }

    /* TICKER */
    .ticker { background: var(--dark); color: var(--bg-soft); padding: 0.9rem 0; overflow: hidden; white-space: nowrap; }
    .ticker-track { display: inline-flex; gap: 3rem; animation: ticker 28s linear infinite; }
    .ticker-item { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; flex-shrink: 0; }
    .ticker-dot { display: inline-block; width: 4px; height: 4px; background: var(--pink); border-radius: 50%; vertical-align: middle; margin: 0 1.5rem; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* SECTIONS */
    section { padding: clamp(5rem,10vw,10rem) 0; }
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: clamp(3rem,5vw,5rem); gap: 2rem; }
    .section-kicker { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brown); margin-bottom: 0.8rem; }
    .section-h2 { font-size: clamp(2rem,3.5vw,3.5rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; color: var(--dark); }
    .section-h2 em { font-family: var(--serif); font-style: italic; font-weight: 300; color: var(--brown); }
    .link-arrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); white-space: nowrap; border-bottom: 1px solid var(--beige); padding-bottom: 2px; }

    /* PHILOSOPHY */
    .philosophy { background: var(--bg-soft); }
    .philosophy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(3rem,6vw,7rem); align-items: center; }
    .philosophy-quote { font-family: var(--serif); font-size: clamp(1.8rem,3vw,2.8rem); font-weight: 300; font-style: italic; line-height: 1.4; color: var(--dark); margin: 1.5rem 0; }
    .philosophy-quote strong { font-style: normal; font-weight: 400; color: var(--brown); }
    .philosophy-body { font-size: 0.95rem; color: var(--mid); line-height: 1.9; max-width: 440px; }
    .philosophy-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--beige); margin-top: 3rem; border: 1px solid var(--beige); }
    .stat-cell { background: var(--bg-soft); padding: 1.6rem; }
    .stat-num { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; color: var(--dark); line-height: 1; }
    .stat-num sup { font-size: 1rem; font-weight: 500; }
    .stat-desc { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brown); margin-top: 0.4rem; }
    .philosophy-image-wrap { position: relative; padding-bottom: 3rem; }

    /* PRODUCTS */
    .products-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .product-card { cursor: pointer; }
    .product-img { aspect-ratio: 3/4; border-radius: 2px; margin-bottom: 1.2rem; position: relative; overflow: hidden; }
    .product-img .ph { height: 100%; }
    .product-meta { display: flex; justify-content: space-between; align-items: flex-start; }
    .product-name { font-size: 0.95rem; font-weight: 500; color: var(--dark); margin-bottom: 0.3rem; }
    .product-sub { font-size: 12px; color: var(--mid); }
    .product-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white); background: var(--brown); padding: 0.3rem 0.7rem; border-radius: 999px; white-space: nowrap; }
    .products-featured { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .product-feat-text { display: flex; flex-direction: column; justify-content: center; padding: 2.5rem; background: var(--bg-soft); border-radius: 2px; }
    .product-feat-h3 { font-size: clamp(1.5rem,2.5vw,2rem); font-weight: 700; letter-spacing: -0.02em; color: var(--dark); margin-bottom: 1rem; }
    .product-feat-body { font-size: 0.9rem; color: var(--mid); line-height: 1.8; margin-bottom: 2rem; }

    /* INGREDIENTS */
    .ingredients { background: var(--dark); color: var(--bg); }
    .ingredients .section-kicker { color: var(--pink); }
    .ingredients .section-h2 { color: var(--bg); }
    .ingredients .section-h2 em { color: var(--pink); }
    .ing-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 2.5rem 0; border-top: 1px solid rgba(255,255,255,0.08); gap: 2rem; }
    .ing-row:last-child { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .ing-name { font-size: clamp(1.8rem,3.5vw,3.5rem); font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
    .ing-name em { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 0.7em; color: var(--gold); }
    .ing-stat { font-size: clamp(2rem,5vw,5rem); font-weight: 900; letter-spacing: -0.04em; color: var(--pink); text-align: center; white-space: nowrap; }
    .ing-stat small { font-size: 0.35em; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); vertical-align: super; }
    .ing-desc { font-size: 0.85rem; color: rgba(246,241,235,0.5); line-height: 1.8; text-align: right; max-width: 300px; margin-left: auto; }
    .ing-origin { display: inline-block; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(196,160,122,0.3); padding: 0.25rem 0.7rem; border-radius: 999px; margin-bottom: 0.5rem; }

    /* NEWS */
    .news { background: var(--bg-soft); }
    .news-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 1.5rem; }
    .news-card-img .ph { aspect-ratio: 4/3; border-radius: 2px; margin-bottom: 1.2rem; }
    .news-card--featured .news-card-img .ph { aspect-ratio: 3/2; }
    .news-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.7rem; }
    .news-cat { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); }
    .news-date { font-size: 11px; color: var(--mid); }
    .news-title { font-size: 1rem; font-weight: 500; color: var(--dark); line-height: 1.4; margin-bottom: 0.5rem; }
    .news-card--featured .news-title { font-size: clamp(1.1rem,1.8vw,1.4rem); }
    .news-excerpt { font-size: 0.85rem; color: var(--mid); line-height: 1.7; }

    /* CONTACT */
    .contact-strip { background: var(--pink-lt); padding: clamp(3rem,5vw,5rem) 0; }
    .contact-inner { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 3rem; }
    .contact-h2 { font-size: clamp(1.8rem,3vw,2.8rem); font-weight: 700; letter-spacing: -0.02em; color: var(--dark); }
    .contact-h2 em { font-family: var(--serif); font-style: italic; font-weight: 300; color: var(--brown); }
    .contact-details { display: flex; flex-direction: column; gap: 0.6rem; text-align: right; }
    .contact-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); }
    .contact-email { font-size: 0.9rem; color: var(--dark); }

    /* FOOTER */
    footer { background: var(--dark); color: rgba(246,241,235,0.5); padding: clamp(3rem,5vw,4rem) 0; }
    .footer-inner { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; }
    .footer-logo { font-size: 16px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white); margin-bottom: 1rem; }
    .footer-tagline { font-family: var(--serif); font-style: italic; font-size: 0.9rem; color: var(--gold); margin-bottom: 1rem; line-height: 1.5; }
    .footer-desc { font-size: 12px; line-height: 1.8; }
    .footer-col-title { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--white); margin-bottom: 1.2rem; }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .footer-links a { font-size: 12px; color: rgba(246,241,235,0.5); transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,0.08); margin-top: 3rem; padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
    .footer-lang-bar { display: flex; gap: 1.5rem; }
    .footer-lang-bar a { font-size: 11px; color: rgba(246,241,235,0.4); transition: color 0.2s; }
    .footer-lang-bar a:hover, .footer-lang-bar a.active { color: var(--gold); }

    /* Lang transition */
    [data-i18n], [data-i18n-html] { transition: opacity 0.15s ease; }
    body.lang-switching [data-i18n],
    body.lang-switching [data-i18n-html] { opacity: 0; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo">Coorionara</a>
    <ul class="nav-links">
      <li><a href="#philosophy" data-i18n="nav.story"></a></li>
      <li><a href="#products" data-i18n="nav.products"></a></li>
      <li><a href="#ingredients" data-i18n="nav.ingredients"></a></li>
      <li><a href="#news" data-i18n="nav.news"></a></li>
      <li><a href="#contact" data-i18n="nav.contact"></a></li>
    </ul>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ko">한국어</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero" style="padding-top:68px; min-height:100svh; display:grid; grid-template-columns:1fr 1fr;">
  <div class="hero-text">
    <p class="hero-eyebrow" data-i18n="hero.eyebrow"></p>
    <h1 class="hero-h1" data-i18n-html="hero.h1"></h1>
    <p class="hero-sub" data-i18n="hero.sub"></p>
    <div class="hero-cta-row">
      <a href="#products" class="btn-primary" data-i18n="hero.cta1"></a>
      <a href="#philosophy" class="btn-ghost" data-i18n="hero.cta2"></a>
    </div>
  </div>
  <div class="hero-image">
    <div class="ph" style="height:100%; min-height:640px;">
      <span class="ph-label">Product Photography</span>
    </div>
    <div class="hero-badge">
      <div class="hero-badge-num">200<sup>%</sup></div>
      <div class="hero-badge-label" data-i18n="hero.badge"></div>
    </div>
  </div>
</section>
<div class="hero-scroll" data-i18n="hero.scroll"></div>

<!-- TICKER -->
<div class="ticker" aria-hidden="true">
  <div class="ticker-track" id="ticker-track">
    <!-- injected by JS -->
  </div>
</div>

<!-- PHILOSOPHY -->
<section class="philosophy" id="philosophy">
  <div class="container">
    <div class="philosophy-grid">
      <div>
        <p class="section-kicker" data-i18n="philosophy.kicker"></p>
        <blockquote class="philosophy-quote" data-i18n-html="philosophy.quote"></blockquote>
        <div class="divider"></div>
        <p class="philosophy-body" data-i18n="philosophy.body1"></p>
        <p class="philosophy-body" style="margin-top:1rem;" data-i18n="philosophy.body2"></p>
        <div class="philosophy-stats">
          <div class="stat-cell">
            <div class="stat-num">15<sup>+</sup></div>
            <div class="stat-desc" data-i18n="philosophy.stat1"></div>
          </div>
          <div class="stat-cell">
            <div class="stat-num">0</div>
            <div class="stat-desc" data-i18n="philosophy.stat2"></div>
          </div>
          <div class="stat-cell">
            <div class="stat-num">3</div>
            <div class="stat-desc" data-i18n="philosophy.stat3"></div>
          </div>
          <div class="stat-cell">
            <div class="stat-num">4</div>
            <div class="stat-desc" data-i18n="philosophy.stat4"></div>
          </div>
        </div>
      </div>
      <div class="philosophy-image-wrap">
        <div class="ph" style="aspect-ratio:3/4; border-radius:2px;">
          <span class="ph-label">Brand Story Image</span>
        </div>
        <div style="position:absolute; bottom:0; left:-2rem; width:52%; border:4px solid var(--white);">
          <div class="ph" style="aspect-ratio:1/1;">
            <span class="ph-label">Detail Shot</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <div class="container">
    <div class="section-header">
      <div>
        <p class="section-kicker" data-i18n="products.kicker"></p>
        <h2 class="section-h2" data-i18n-html="products.h2"></h2>
      </div>
      <a href="#" class="link-arrow" data-i18n="products.viewAll"></a>
    </div>
    <div class="products-grid">
      <div class="product-card">
        <div class="product-img"><div class="ph" style="height:100%;"><span class="ph-label">Hydration Line</span></div></div>
        <div class="product-meta">
          <div>
            <p class="product-name" data-i18n="products.p1.name"></p>
            <p class="product-sub" data-i18n="products.p1.sub"></p>
          </div>
          <span class="product-badge" data-i18n="products.badge.best"></span>
        </div>
      </div>
      <div class="product-card">
        <div class="product-img"><div class="ph" style="height:100%; background:var(--pink-lt);"><span class="ph-label">Brightening Line</span></div></div>
        <div class="product-meta">
          <div>
            <p class="product-name" data-i18n="products.p2.name"></p>
            <p class="product-sub" data-i18n="products.p2.sub"></p>
          </div>
        </div>
      </div>
      <div class="product-card">
        <div class="product-img"><div class="ph" style="height:100%; background:var(--bg-soft);"><span class="ph-label">Barrier Line</span></div></div>
        <div class="product-meta">
          <div>
            <p class="product-name" data-i18n="products.p3.name"></p>
            <p class="product-sub" data-i18n="products.p3.sub"></p>
          </div>
          <span class="product-badge" style="background:var(--pink);" data-i18n="products.badge.new"></span>
        </div>
      </div>
    </div>
    <div class="products-featured">
      <div><div class="ph" style="aspect-ratio:16/9; border-radius:2px;"><span class="ph-label">Collection Flat-lay</span></div></div>
      <div class="product-feat-text">
        <p class="section-kicker" data-i18n="products.feat.kicker"></p>
        <h3 class="product-feat-h3" data-i18n-html="products.feat.h3"></h3>
        <p class="product-feat-body" data-i18n="products.feat.body"></p>
        <a href="#" class="btn-primary" style="align-self:flex-start;" data-i18n="products.feat.cta"></a>
      </div>
    </div>
  </div>
</section>

<!-- INGREDIENTS -->
<section class="ingredients" id="ingredients">
  <div class="container">
    <div class="section-header">
      <div>
        <p class="section-kicker" data-i18n="ing.kicker"></p>
        <h2 class="section-h2" data-i18n-html="ing.h2"></h2>
      </div>
      <a href="#" class="link-arrow" style="color:var(--gold); border-color:rgba(196,160,122,0.3);" data-i18n="ing.link"></a>
    </div>
    <div>
      <div class="ing-row">
        <div><div class="ing-name" data-i18n-html="ing.i1.name"></div></div>
        <div class="ing-stat">200<small>%</small></div>
        <div class="ing-desc">
          <span class="ing-origin" data-i18n="ing.i1.origin"></span>
          <p data-i18n="ing.i1.desc"></p>
        </div>
      </div>
      <div class="ing-row">
        <div><div class="ing-name" data-i18n-html="ing.i2.name"></div></div>
        <div class="ing-stat">98<small>%</small></div>
        <div class="ing-desc">
          <span class="ing-origin" data-i18n="ing.i2.origin"></span>
          <p data-i18n="ing.i2.desc"></p>
        </div>

/* ─────────────────────────────────────────────────
   ENGINE
───────────────────────────────────────────────── */
let currentLang = 'en';

function buildTicker(lang) {
  const items = T[lang]['ticker'];
  const double = [...items, ...items]; // loop seamlessly
  return double.map(t =>
    `<span class="ticker-item">${t}</span><span class="ticker-dot"></span>`
  ).join('');
}

function applyLang(lang) {
  const dict = T[lang];
  if (!dict) return;

  document.body.classList.add('lang-switching');

  setTimeout(() => {
    // text nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key] !== undefined) el.textContent = dict[key];
    });
    // html nodes
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (dict[key] !== undefined) el.innerHTML = dict[key];
    });

    // ticker
    document.getElementById('ticker-track').innerHTML = buildTicker(lang);

    // footer lang bar active
    document.querySelectorAll('.footer-lang-bar a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('data-lang') === lang);
    });

    // html lang attr
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;

    document.body.classList.remove('lang-switching');
  }, 150);
}

// Nav buttons
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.getAttribute('data-lang');
    if (lang === currentLang) return;
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyLang(lang);
  });
});

// Footer lang links
document.querySelectorAll('.footer-lang-bar a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const lang = a.getAttribute('data-lang');
    if (lang === currentLang) return;
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-lang') === lang);
    });
    applyLang(lang);
  });
});

// Init
applyLang('en');
</script>
